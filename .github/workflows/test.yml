name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,bridge]"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
          mkdir -p ../src/icom_lan/web/static
          cp -r dist/* ../src/icom_lan/web/static/

      - name: Lint web boundary
        run: ruff check src/icom_lan/web

      - name: Type-check web boundary
        run: mypy --strict src/icom_lan/web

      - name: Run tests
        run: pytest tests/test_*.py -v --tb=short --timeout=300 --timeout-method=thread
