name: Bug Report
description: Report a bug or unexpected behavior
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps or code to reproduce.
      render: python

  - type: input
    id: radio
    attributes:
      label: Radio Model
      placeholder: "e.g., IC-7610, IC-7300"

  - type: input
    id: version
    attributes:
      label: icom-lan Version
      placeholder: "e.g., 0.11.0"

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "e.g., 3.12"

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g., macOS 15, Ubuntu 24.04"

  - type: textarea
    id: logs
    attributes:
      label: Debug Log
      description: "Run with `logging.basicConfig(level=logging.DEBUG)`"
      render: text

  - type: textarea
    id: analysis
    attributes:
      label: Analysis (filled during fix)
      description: |
        Root cause, fix description, commit hash.
        Updated by developer after resolution.
