<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>icom-lan Web UI</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d1117;
  color: #c9d1d9;
  font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* === Status Bar === */
#status-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 6px 16px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
#status-bar h1 { font-size: 15px; color: #58a6ff; font-weight: 600; }
.status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #f85149;
  flex-shrink: 0;
}
.status-dot.connected { background: #3fb950; }
.status-dot.reconnecting { background: #d29922; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
#radio-model { color: #8b949e; }
#freq-display {
  margin-left: auto;
  font-size: 20px;
  color: #3fb950;
  letter-spacing: 1px;
  font-weight: 700;
}

/* === Main Area === */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  padding: 4px;
  gap: 2px;
}

/* === Spectrum === */
#spectrum-wrap {
  position: relative;
  height: 180px;
  flex-shrink: 0;
  background: #0d1117;
  border: 1px solid #21262d;
  border-radius: 4px;
}
#spectrum { width: 100%; height: 100%; display: block; }

/* === Waterfall === */
#waterfall-wrap {
  position: relative;
  flex: 1;
  min-height: 120px;
  background: #000;
  border: 1px solid #21262d;
  border-radius: 4px;
  cursor: crosshair;
  overflow: hidden;
}
#waterfall { width: 100%; height: 100%; display: block; }

/* === Freq Axis === */
#freq-axis {
  height: 24px;
  flex-shrink: 0;
  position: relative;
  background: #161b22;
  border: 1px solid #21262d;
  border-radius: 4px;
  overflow: hidden;
}
#freq-axis canvas { width: 100%; height: 100%; display: block; }

/* === Controls Placeholder === */
#controls-placeholder {
  flex-shrink: 0;
  padding: 8px 16px;
  background: #161b22;
  border: 1px solid #21262d;
  border-radius: 4px;
  color: #484f58;
  text-align: center;
  font-size: 12px;
}

/* === Hover Tooltip === */
#tooltip {
  position: absolute;
  background: rgba(22,27,34,0.92);
  color: #c9d1d9;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 12px;
  pointer-events: none;
  display: none;
  z-index: 10;
  border: 1px solid #30363d;
}
</style>
</head>
<body>

<div id="status-bar">
  <h1>icom-lan</h1>
  <div class="status-dot" id="status-dot"></div>
  <span id="conn-text">Disconnected</span>
  <span id="radio-model"></span>
  <span id="freq-display">—</span>
</div>

<div id="main">
  <div id="spectrum-wrap">
    <canvas id="spectrum"></canvas>
  </div>
  <div id="waterfall-wrap">
    <canvas id="waterfall"></canvas>
    <div id="tooltip"></div>
  </div>
  <div id="freq-axis"><canvas id="freq-axis-cv"></canvas></div>
  <div id="controls-placeholder">Controls &amp; Meters — Sprint 3</div>
</div>

<script>
'use strict';

// ===== Configuration =====
const WS_RECONNECT_MIN = 1000;
const WS_RECONNECT_MAX = 30000;
const SCOPE_MSG_TYPE = 0x01;
const HEADER_SIZE = 16;

// ===== Color LUT for waterfall (0-160 → ABGR for Uint32Array on LE) =====
const COLOR_LUT = new Uint32Array(161);
(function buildLUT() {
  // 0-40: black → dark blue
  // 40-80: dark blue → cyan
  // 80-120: cyan → yellow
  // 120-150: yellow → red
  // 150-160: red → white
  function lerp(a, b, t) { return a + (b - a) * t; }
  function rgba(r, g, b) { return (255 << 24) | (b << 16) | (g << 8) | r; } // ABGR LE

  for (let i = 0; i <= 160; i++) {
    let r, g, b;
    if (i <= 40) {
      const t = i / 40;
      r = 0; g = 0; b = lerp(10, 80, t);
    } else if (i <= 80) {
      const t = (i - 40) / 40;
      r = 0; g = lerp(0, 220, t); b = lerp(80, 200, t);
    } else if (i <= 120) {
      const t = (i - 80) / 40;
      r = lerp(0, 255, t); g = lerp(220, 255, t); b = lerp(200, 0, t);
    } else if (i <= 150) {
      const t = (i - 120) / 30;
      r = 255; g = lerp(255, 40, t); b = 0;
    } else {
      const t = (i - 150) / 10;
      r = 255; g = lerp(40, 255, t); b = lerp(0, 255, t);
    }
    COLOR_LUT[i] = rgba(Math.round(r), Math.round(g), Math.round(b));
  }
})();

// ===== DOM =====
const statusDot = document.getElementById('status-dot');
const connText = document.getElementById('conn-text');
const radioModel = document.getElementById('radio-model');
const freqDisplay = document.getElementById('freq-display');
const tooltip = document.getElementById('tooltip');

const spectrumCanvas = document.getElementById('spectrum');
const spectrumCtx = spectrumCanvas.getContext('2d');

const wfCanvas = document.getElementById('waterfall');
const wfCtx = wfCanvas.getContext('2d');

const freqAxisCanvas = document.getElementById('freq-axis-cv');
const freqAxisCtx = freqAxisCanvas.getContext('2d');

// ===== State =====
let controlWs = null;
let scopeWs = null;
let controlBackoff = WS_RECONNECT_MIN;
let scopeBackoff = WS_RECONNECT_MIN;
let currentStartFreq = 14000000;
let currentEndFreq = 14350000;
let currentPixels = null;
let wfLineImageData = null;
let wfLineBuf32 = null;
let wfMeta = []; // per-line {startFreq, endFreq}
let wfHeight = 0;

// ===== Helpers =====
function formatFreq(hz) {
  const mhz = hz / 1e6;
  return mhz.toFixed(mhz >= 100 ? 3 : mhz >= 10 ? 4 : 6) + ' MHz';
}

function getWsBase() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return proto + '//' + location.host;
}

function setStatus(state, text) {
  statusDot.className = 'status-dot ' + state;
  connText.textContent = text;
}

// ===== Canvas Sizing =====
function resizeCanvases() {
  const dpr = window.devicePixelRatio || 1;

  // Spectrum
  const sw = spectrumCanvas.parentElement.clientWidth;
  const sh = spectrumCanvas.parentElement.clientHeight;
  spectrumCanvas.width = sw * dpr;
  spectrumCanvas.height = sh * dpr;
  spectrumCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Waterfall
  const ww = wfCanvas.parentElement.clientWidth;
  const wh = wfCanvas.parentElement.clientHeight;
  wfCanvas.width = ww; // 1:1 for putImageData
  wfCanvas.height = wh;
  wfHeight = wh;
  wfLineImageData = wfCtx.createImageData(ww, 1);
  wfLineBuf32 = new Uint32Array(wfLineImageData.data.buffer);
  wfMeta = new Array(wh).fill(null);

  // Freq axis
  const fw = freqAxisCanvas.parentElement.clientWidth;
  const fh = freqAxisCanvas.parentElement.clientHeight;
  freqAxisCanvas.width = fw * dpr;
  freqAxisCanvas.height = fh * dpr;
  freqAxisCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  drawFreqAxis();
  if (currentPixels) drawSpectrum(currentPixels);
}

window.addEventListener('resize', resizeCanvases);

// ===== Spectrum Renderer =====
function drawSpectrum(pixels) {
  const w = spectrumCanvas.parentElement.clientWidth;
  const h = spectrumCanvas.parentElement.clientHeight;
  const ctx = spectrumCtx;
  const n = pixels.length;
  if (n === 0) return;

  ctx.clearRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 0.5;
  for (let y = 0; y < h; y += h / 5) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
  for (let x = 0; x < w; x += w / 10) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
  }

  // Signal curve
  const scaleX = w / n;
  const scaleY = h / 160;

  // Fill gradient under curve
  ctx.beginPath();
  ctx.moveTo(0, h);
  for (let i = 0; i < n; i++) {
    const x = i * scaleX;
    const y = h - pixels[i] * scaleY;
    if (i === 0) ctx.lineTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.lineTo(w, h);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, 'rgba(88, 166, 255, 0.3)');
  grad.addColorStop(1, 'rgba(88, 166, 255, 0.02)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const x = i * scaleX;
    const y = h - pixels[i] * scaleY;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 1.2;
  ctx.stroke();
}

// ===== Waterfall Renderer =====
function drawWaterfallLine(pixels) {
  const w = wfCanvas.width;
  const n = pixels.length;
  if (n === 0 || !wfLineBuf32) return;

  // Scroll down
  wfCtx.drawImage(wfCanvas, 0, 0, w, wfCanvas.height - 1, 0, 1, w, wfCanvas.height - 1);

  // Draw new top line
  const imgW = wfLineImageData.width;
  for (let i = 0; i < imgW; i++) {
    const pi = Math.min(Math.floor(i * n / imgW), n - 1);
    const val = Math.min(pixels[pi], 160);
    wfLineBuf32[i] = COLOR_LUT[val];
  }
  wfCtx.putImageData(wfLineImageData, 0, 0);

  // Store metadata
  wfMeta.pop();
  wfMeta.unshift({ startFreq: currentStartFreq, endFreq: currentEndFreq });
}

// ===== Frequency Axis =====
function drawFreqAxis() {
  const w = freqAxisCanvas.parentElement.clientWidth;
  const h = freqAxisCanvas.parentElement.clientHeight;
  const ctx = freqAxisCtx;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#8b949e';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';

  const span = currentEndFreq - currentStartFreq;
  if (span <= 0) return;

  // Choose nice tick interval
  const targetTicks = Math.max(4, Math.min(12, Math.floor(w / 80)));
  let step = span / targetTicks;
  // Round to nice number
  const mag = Math.pow(10, Math.floor(Math.log10(step)));
  const norm = step / mag;
  if (norm < 2) step = 2 * mag;
  else if (norm < 5) step = 5 * mag;
  else step = 10 * mag;

  const first = Math.ceil(currentStartFreq / step) * step;
  for (let f = first; f <= currentEndFreq; f += step) {
    const x = (f - currentStartFreq) / span * w;
    const mhz = f / 1e6;
    ctx.fillText(mhz.toFixed(mhz >= 100 ? 1 : 3), x, h - 4);
    ctx.fillStyle = '#30363d';
    ctx.fillRect(x - 0.5, 0, 1, 4);
    ctx.fillStyle = '#8b949e';
  }
}

// ===== Binary Frame Parser =====
function parseScopeFrame(buf) {
  const dv = new DataView(buf);
  if (dv.byteLength < HEADER_SIZE) return null;
  const msgType = dv.getUint8(0);
  if (msgType !== SCOPE_MSG_TYPE) return null;

  const receiver = dv.getUint8(1);
  const mode = dv.getUint8(2);
  const startFreq = dv.getUint32(3, true);
  const endFreq = dv.getUint32(7, true);
  const sequence = dv.getUint16(11, true);
  const flags = dv.getUint8(13);
  const pixelCount = dv.getUint16(14, true);

  if (dv.byteLength < HEADER_SIZE + pixelCount) return null;
  const pixels = new Uint8Array(buf, HEADER_SIZE, pixelCount);

  return { receiver, mode, startFreq, endFreq, sequence, flags, pixelCount, pixels };
}

// ===== Control WebSocket =====
function connectControl() {
  const url = getWsBase() + '/api/v1/ws';
  controlWs = new WebSocket(url);
  setStatus('reconnecting', 'Connecting...');

  controlWs.onopen = () => {
    controlBackoff = WS_RECONNECT_MIN;
    setStatus('connected', 'Connected');
    // hello will arrive from server, then we subscribe
  };

  controlWs.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      handleControlMessage(msg);
    } catch (e) {
      console.warn('Control WS parse error:', e);
    }
  };

  controlWs.onclose = () => {
    setStatus('reconnecting', 'Reconnecting...');
    setTimeout(connectControl, controlBackoff);
    controlBackoff = Math.min(controlBackoff * 2, WS_RECONNECT_MAX);
  };

  controlWs.onerror = () => { controlWs.close(); };
}

function handleControlMessage(msg) {
  switch (msg.type) {
    case 'hello':
      radioModel.textContent = msg.radio || '';
      // Subscribe to scope
      sendControl({ type: 'subscribe', id: 's1', streams: ['scope', 'meters'] });
      // Connect scope WS after hello
      if (!scopeWs || scopeWs.readyState > 1) connectScope();
      break;
    case 'state':
      if (msg.data) {
        if (msg.data.freq_a) freqDisplay.textContent = formatFreq(msg.data.freq_a);
        if (msg.data.scope) {
          currentStartFreq = msg.data.scope.start_freq || currentStartFreq;
          currentEndFreq = msg.data.scope.end_freq || currentEndFreq;
          drawFreqAxis();
        }
      }
      break;
    case 'event':
      if (msg.name === 'freq_changed' && msg.data) {
        freqDisplay.textContent = formatFreq(msg.data.freq);
      } else if (msg.name === 'scope_meta' && msg.data) {
        currentStartFreq = msg.data.start_freq || currentStartFreq;
        currentEndFreq = msg.data.end_freq || currentEndFreq;
        drawFreqAxis();
      }
      break;
    case 'response':
      // Command responses — log for now
      if (!msg.ok) console.warn('Command error:', msg.error, msg.message);
      break;
  }
}

function sendControl(obj) {
  if (controlWs && controlWs.readyState === WebSocket.OPEN) {
    controlWs.send(JSON.stringify(obj));
  }
}

// ===== Scope WebSocket =====
function connectScope() {
  const url = getWsBase() + '/api/v1/scope';
  scopeWs = new WebSocket(url);
  scopeWs.binaryType = 'arraybuffer';

  scopeWs.onopen = () => {
    scopeBackoff = WS_RECONNECT_MIN;
  };

  scopeWs.onmessage = (ev) => {
    if (ev.data instanceof ArrayBuffer) {
      const frame = parseScopeFrame(ev.data);
      if (!frame) return;

      // Update freq range if changed
      if (frame.startFreq !== currentStartFreq || frame.endFreq !== currentEndFreq) {
        currentStartFreq = frame.startFreq;
        currentEndFreq = frame.endFreq;
        drawFreqAxis();
      }

      currentPixels = frame.pixels;
      drawSpectrum(frame.pixels);
      drawWaterfallLine(frame.pixels);
    }
  };

  scopeWs.onclose = () => {
    setTimeout(connectScope, scopeBackoff);
    scopeBackoff = Math.min(scopeBackoff * 2, WS_RECONNECT_MAX);
  };

  scopeWs.onerror = () => { scopeWs.close(); };
}

// ===== Click-to-Tune =====
wfCanvas.parentElement.addEventListener('click', (e) => {
  const rect = wfCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const row = Math.floor(y);

  // Use per-line metadata if available
  let sf = currentStartFreq, ef = currentEndFreq;
  if (row >= 0 && row < wfMeta.length && wfMeta[row]) {
    sf = wfMeta[row].startFreq;
    ef = wfMeta[row].endFreq;
  }

  const ratio = x / rect.width;
  const freq = Math.round(sf + ratio * (ef - sf));
  freqDisplay.textContent = formatFreq(freq);
  sendControl({ type: 'cmd', id: 'tune-' + Date.now(), name: 'set_freq', params: { vfo: 'A', freq: freq } });
});

// ===== Hover tooltip on waterfall =====
wfCanvas.parentElement.addEventListener('mousemove', (e) => {
  const rect = wfCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const row = Math.floor(e.clientY - rect.top);

  let sf = currentStartFreq, ef = currentEndFreq;
  if (row >= 0 && row < wfMeta.length && wfMeta[row]) {
    sf = wfMeta[row].startFreq;
    ef = wfMeta[row].endFreq;
  }

  const ratio = x / rect.width;
  const freq = sf + ratio * (ef - sf);
  tooltip.textContent = formatFreq(Math.round(freq));
  tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
  tooltip.style.top = (e.clientY - rect.top - 24) + 'px';
  tooltip.style.display = 'block';
});

wfCanvas.parentElement.addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
});

// ===== Init =====
resizeCanvases();
connectControl();
</script>
</body>
</html>
