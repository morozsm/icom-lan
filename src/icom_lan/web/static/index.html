<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>icom-lan Web UI</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d1117;
  color: #c9d1d9;
  font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* === Status Bar === */
#status-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 6px 16px; background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0;
}
#status-bar h1 { font-size: 15px; color: #58a6ff; font-weight: 600; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; background: #f85149; flex-shrink: 0; }
.status-dot.connected { background: #3fb950; }
.status-dot.reconnecting { background: #d29922; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
#radio-model { color: #8b949e; }
#freq-display { margin-left: auto; font-size: 22px; color: #3fb950; letter-spacing: 1px; font-weight: 700; cursor: pointer; }
#freq-display:hover { color: #56d364; }

/* === Main Layout === */
#main { flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 4px; gap: 2px; }

/* === Spectrum === */
#spectrum-wrap { position: relative; height: 160px; flex-shrink: 0; background: #0d1117; border: 1px solid #21262d; border-radius: 4px; }
#spectrum { width: 100%; height: 100%; display: block; }

/* === Waterfall === */
#waterfall-wrap { position: relative; flex: 1; min-height: 100px; background: #000; border: 1px solid #21262d; border-radius: 4px; cursor: crosshair; overflow: hidden; }
#waterfall { width: 100%; height: 100%; display: block; }
#wf-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

/* === Freq Axis === */
#freq-axis { height: 22px; flex-shrink: 0; background: #161b22; border: 1px solid #21262d; border-radius: 4px; overflow: hidden; }
#freq-axis canvas { width: 100%; height: 100%; display: block; }

/* === Controls Panel === */
#controls {
  flex-shrink: 0; display: flex; gap: 8px; padding: 8px;
  background: #161b22; border: 1px solid #21262d; border-radius: 4px;
  flex-wrap: wrap; align-items: center;
}
.ctrl-group {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px; background: #0d1117; border-radius: 4px; border: 1px solid #21262d;
}
.ctrl-group label { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.ctrl-group select, .ctrl-group input[type="number"] {
  background: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-radius: 3px;
  padding: 3px 6px; font-family: inherit; font-size: 13px; outline: none;
}
.ctrl-group select:focus, .ctrl-group input:focus { border-color: #58a6ff; }
.ctrl-group select { cursor: pointer; }

/* VFO buttons */
.vfo-btn {
  padding: 4px 10px; border: 1px solid #30363d; border-radius: 3px;
  background: #21262d; color: #c9d1d9; cursor: pointer; font-family: inherit; font-size: 12px;
}
.vfo-btn:hover { background: #30363d; }
.vfo-btn.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }

/* PTT button */
#ptt-btn {
  padding: 6px 16px; border: 2px solid #f85149; border-radius: 4px;
  background: #21262d; color: #f85149; cursor: pointer; font-family: inherit;
  font-size: 13px; font-weight: 700; text-transform: uppercase; transition: all 0.15s;
}
#ptt-btn:hover { background: #f8514920; }
#ptt-btn.active { background: #f85149; color: #fff; }

/* ATT/Preamp */
.att-btn {
  padding: 3px 8px; border: 1px solid #30363d; border-radius: 3px;
  background: #21262d; color: #8b949e; cursor: pointer; font-family: inherit; font-size: 11px;
}
.att-btn:hover { background: #30363d; }
.att-btn.active { background: #1f6feb30; color: #58a6ff; border-color: #1f6feb; }

/* === Meters Panel === */
#meters {
  flex-shrink: 0; display: flex; gap: 8px; padding: 6px 8px;
  background: #161b22; border: 1px solid #21262d; border-radius: 4px; flex-wrap: wrap;
}
.meter {
  flex: 1; min-width: 100px; max-width: 200px;
}
.meter-label { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.meter-bar-wrap {
  height: 14px; background: #0d1117; border-radius: 2px; border: 1px solid #21262d; overflow: hidden; position: relative;
}
.meter-bar {
  height: 100%; border-radius: 1px; transition: width 0.08s linear;
  min-width: 0;
}
.meter-value {
  position: absolute; right: 4px; top: 0; line-height: 14px; font-size: 10px; color: #8b949e;
}
.meter-bar.s-meter { background: linear-gradient(90deg, #3fb950, #3fb950 70%, #f0883e 70%, #f85149); }
.meter-bar.power { background: #58a6ff; }
.meter-bar.swr { background: linear-gradient(90deg, #3fb950, #3fb950 50%, #f0883e 50%, #f85149); }
.meter-bar.alc { background: linear-gradient(90deg, #3fb950, #3fb950 60%, #f0883e 60%, #f85149); }
.meter-bar.comp { background: #d2a8ff; }
.meter-bar.id { background: #f0883e; }
.meter-bar.vd { background: #79c0ff; }
.meter-bar.temp { background: linear-gradient(90deg, #3fb950, #f0883e, #f85149); }

/* === Freq Edit Modal === */
#freq-modal {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center;
}
#freq-modal.open { display: flex; }
#freq-modal-box {
  background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  padding: 16px 24px; text-align: center;
}
#freq-input {
  background: #0d1117; color: #3fb950; border: 2px solid #30363d; border-radius: 4px;
  padding: 8px 12px; font-family: inherit; font-size: 24px; font-weight: 700;
  text-align: center; width: 260px; outline: none;
}
#freq-input:focus { border-color: #58a6ff; }
#freq-modal-hint { color: #8b949e; font-size: 11px; margin-top: 8px; }

/* === Audio Controls === */
.audio-btn {
  padding: 4px 12px; border: 1px solid #30363d; border-radius: 3px;
  background: #21262d; color: #c9d1d9; cursor: pointer; font-family: inherit; font-size: 12px;
  transition: all 0.15s;
}
.audio-btn:hover { background: #30363d; }
.audio-btn.active { background: #238636; color: #fff; border-color: #238636; }
.audio-btn.active:hover { background: #2ea043; }
#audio-vol { width: 80px; accent-color: #58a6ff; vertical-align: middle; }
#audio-status { font-size: 10px; color: #8b949e; }

/* === Tooltip === */
#tooltip {
  position: absolute; background: rgba(22,27,34,0.92); color: #c9d1d9;
  padding: 3px 8px; border-radius: 4px; font-size: 12px; pointer-events: none;
  display: none; z-index: 10; border: 1px solid #30363d;
}

/* === Toast notifications === */
#toast {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: #f85149; color: #fff; padding: 8px 20px; border-radius: 6px;
  font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; max-width: 90vw; text-align: center;
}
#toast.show { opacity: 1; }
#toast.warn { background: #d29922; }
#toast.info { background: #1f6feb; }

/* === Theme toggle === */
#theme-btn {
  background: none; border: none; color: #8b949e; cursor: pointer;
  font-size: 16px; padding: 2px 6px; border-radius: 3px;
}
#theme-btn:hover { background: #21262d; }

/* === Light theme === */
body.light { background: #f6f8fa; color: #1f2328; }
body.light #status-bar, body.light #controls, body.light #meters,
body.light #freq-axis, body.light #freq-modal-box { background: #fff; border-color: #d0d7de; }
body.light .ctrl-group, body.light #spectrum-wrap { background: #f6f8fa; border-color: #d0d7de; }
body.light #waterfall-wrap { border-color: #d0d7de; }
body.light .ctrl-group select, body.light .ctrl-group input[type="number"] { background: #fff; color: #1f2328; border-color: #d0d7de; }
body.light .vfo-btn, body.light .att-btn, body.light .audio-btn { background: #f6f8fa; color: #1f2328; border-color: #d0d7de; }
body.light .meter-bar-wrap { background: #f6f8fa; border-color: #d0d7de; }
body.light .meter-label, body.light .meter-value, body.light #radio-model,
body.light .ctrl-group label, body.light #audio-status { color: #656d76; }
body.light #freq-display { color: #1a7f37; }
body.light #tooltip { background: rgba(255,255,255,0.95); color: #1f2328; border-color: #d0d7de; }
body.light #freq-input { background: #fff; color: #1a7f37; border-color: #d0d7de; }
body.light #toast { }

/* === Responsive: tablet/mobile === */
@media (max-width: 768px) {
  #status-bar { padding: 4px 8px; gap: 6px; flex-wrap: wrap; }
  #freq-display { font-size: 18px; margin-left: 0; flex-basis: 100%; text-align: right; order: 10; }
  #spectrum-wrap { height: 120px; }
  #controls { gap: 4px; padding: 4px; }
  .ctrl-group { padding: 3px 5px; gap: 4px; }
  .ctrl-group label { font-size: 10px; }
  #meters { gap: 4px; padding: 4px; }
  .meter { min-width: 80px; }
}
@media (max-width: 480px) {
  body { font-size: 12px; }
  #status-bar h1 { font-size: 13px; }
  #freq-display { font-size: 16px; }
  #spectrum-wrap { height: 90px; }
  #controls { flex-direction: column; }
  .ctrl-group { flex-wrap: wrap; }
  #ptt-btn { width: 100%; padding: 10px; font-size: 16px; }
}
</style>
</head>
<body>

<div id="status-bar">
  <h1>icom-lan</h1>
  <div class="status-dot" id="status-dot"></div>
  <span id="conn-text">Disconnected</span>
  <span id="radio-model"></span>
  <button id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark theme">🌙</button>
  <span id="freq-display" title="Click to enter frequency">—</span>
</div>
<div id="toast"></div>

<div id="main">
  <div id="spectrum-wrap"><canvas id="spectrum"></canvas></div>
  <div id="waterfall-wrap"><canvas id="waterfall"></canvas><canvas id="wf-overlay"></canvas><div id="tooltip"></div></div>
  <div id="freq-axis"><canvas id="freq-axis-cv"></canvas></div>

  <!-- Controls -->
  <div id="controls">
    <div class="ctrl-group">
      <label>VFO</label>
      <button class="vfo-btn active" id="vfo-a" onclick="selectVfo('A')">A</button>
      <button class="vfo-btn" id="vfo-b" onclick="selectVfo('B')">B</button>
      <button class="vfo-btn" onclick="sendCmd('vfo_swap')" title="Swap A↔B">A↔B</button>
      <button class="vfo-btn" onclick="sendCmd('vfo_equalize')" title="A=B">A=B</button>
    </div>
    <div class="ctrl-group" id="band-group">
      <label>Band</label>
      <button class="vfo-btn" data-band="0" onclick="tuneBand(0)" title="160m · 1.840 MHz [1]">160m</button>
      <button class="vfo-btn" data-band="1" onclick="tuneBand(1)" title="80m · 3.573 MHz [2]">80m</button>
      <button class="vfo-btn" data-band="2" onclick="tuneBand(2)" title="60m · 5.357 MHz [3]">60m</button>
      <button class="vfo-btn" data-band="3" onclick="tuneBand(3)" title="40m · 7.074 MHz [4]">40m</button>
      <button class="vfo-btn" data-band="4" onclick="tuneBand(4)" title="30m · 10.136 MHz [5]">30m</button>
      <button class="vfo-btn" data-band="5" onclick="tuneBand(5)" title="20m · 14.074 MHz [6]">20m</button>
      <button class="vfo-btn" data-band="6" onclick="tuneBand(6)" title="17m · 18.100 MHz [7]">17m</button>
      <button class="vfo-btn" data-band="7" onclick="tuneBand(7)" title="15m · 21.074 MHz [8]">15m</button>
      <button class="vfo-btn" data-band="8" onclick="tuneBand(8)" title="12m · 24.915 MHz [9]">12m</button>
      <button class="vfo-btn" data-band="9" onclick="tuneBand(9)" title="10m · 28.074 MHz [0]">10m</button>
      <button class="vfo-btn" data-band="10" onclick="tuneBand(10)" title="6m · 50.313 MHz">6m</button>
    </div>
    <div class="ctrl-group">
      <label>Mode</label>
      <select id="mode-sel" onchange="sendCmd('set_mode',{mode:this.value}); setModeDefaultStep(this.value)">
        <option>USB</option><option>LSB</option><option>CW</option><option>CW-R</option>
        <option>AM</option><option>FM</option><option>RTTY</option><option>RTTY-R</option>
        <option>PSK</option><option>PSK-R</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Filter</label>
      <select id="filter-sel" onchange="sendCmd('set_filter',{filter:this.value})">
        <option>FIL1</option><option>FIL2</option><option>FIL3</option>
      </select>
    </div>
    <div class="ctrl-group" id="step-group">
      <label>Step</label>
      <button class="att-btn" data-step="10"    onclick="setStep(10)">10</button>
      <button class="att-btn" data-step="50"    onclick="setStep(50)">50</button>
      <button class="att-btn" data-step="100"   onclick="setStep(100)">100</button>
      <button class="att-btn" data-step="500"   onclick="setStep(500)">500</button>
      <button class="att-btn" data-step="1000"  onclick="setStep(1000)">1k</button>
      <button class="att-btn" data-step="5000"  onclick="setStep(5000)">5k</button>
      <button class="att-btn" data-step="10000" onclick="setStep(10000)">10k</button>
      <button class="att-btn" data-step="25000" onclick="setStep(25000)">25k</button>
    </div>
    <div class="ctrl-group">
      <label>Power</label>
      <input type="number" id="power-input" min="0" max="100" value="100" style="width:56px"
             onchange="sendCmd('set_power',{level:+this.value})">
      <span style="color:#8b949e;font-size:11px">W</span>
    </div>
    <div class="ctrl-group">
      <label>ATT</label>
      <button class="att-btn" data-att="0" onclick="setAtt(0)">OFF</button>
      <button class="att-btn" data-att="6" onclick="setAtt(6)">6</button>
      <button class="att-btn" data-att="12" onclick="setAtt(12)">12</button>
      <button class="att-btn" data-att="18" onclick="setAtt(18)">18</button>
    </div>
    <div class="ctrl-group">
      <label>Pre</label>
      <button class="att-btn" data-pre="0" onclick="setPreamp(0)">OFF</button>
      <button class="att-btn" data-pre="1" onclick="setPreamp(1)">1</button>
      <button class="att-btn" data-pre="2" onclick="setPreamp(2)">2</button>
    </div>
    <div class="ctrl-group">
      <label>Audio</label>
      <button class="audio-btn" id="rx-btn" onclick="toggleRxAudio()">🔊 RX</button>
      <input type="range" id="audio-vol" min="0" max="100" value="80" oninput="setAudioVolume(this.value)">
      <span id="audio-status"></span>
    </div>
    <button id="ptt-btn">PTT</button>
  </div>

  <!-- Meters -->
  <div id="meters">
    <div class="meter" id="m-smeter">
      <div class="meter-label">S-Meter</div>
      <div class="meter-bar-wrap"><div class="meter-bar s-meter" style="width:0%"></div><span class="meter-value">—</span></div>
    </div>
    <div class="meter" id="m-power">
      <div class="meter-label">Power</div>
      <div class="meter-bar-wrap"><div class="meter-bar power" style="width:0%"></div><span class="meter-value">—</span></div>
    </div>
    <div class="meter" id="m-swr">
      <div class="meter-label">SWR</div>
      <div class="meter-bar-wrap"><div class="meter-bar swr" style="width:0%"></div><span class="meter-value">—</span></div>
    </div>
    <div class="meter" id="m-alc">
      <div class="meter-label">ALC</div>
      <div class="meter-bar-wrap"><div class="meter-bar alc" style="width:0%"></div><span class="meter-value">—</span></div>
    </div>
    <div class="meter" id="m-comp">
      <div class="meter-label">COMP</div>
      <div class="meter-bar-wrap"><div class="meter-bar comp" style="width:0%"></div><span class="meter-value">—</span></div>
    </div>
    <div class="meter" id="m-id">
      <div class="meter-label">Id</div>
      <div class="meter-bar-wrap"><div class="meter-bar id" style="width:0%"></div><span class="meter-value">—</span></div>
    </div>
    <div class="meter" id="m-vd">
      <div class="meter-label">Vd</div>
      <div class="meter-bar-wrap"><div class="meter-bar vd" style="width:0%"></div><span class="meter-value">—</span></div>
    </div>
    <div class="meter" id="m-temp">
      <div class="meter-label">TEMP</div>
      <div class="meter-bar-wrap"><div class="meter-bar temp" style="width:0%"></div><span class="meter-value">—</span></div>
    </div>
  </div>
</div>

<!-- Frequency edit modal -->
<div id="freq-modal">
  <div id="freq-modal-box">
    <input type="text" id="freq-input" placeholder="14.074000">
    <div id="freq-modal-hint">Enter frequency in MHz · Press Enter to tune · Esc to cancel</div>
  </div>
</div>

<script>
'use strict';

// ===== Constants =====
const WS_RECONNECT_MIN = 1000;
const WS_RECONNECT_MAX = 30000;
const SCOPE_MSG_TYPE = 0x01;
const METER_MSG_TYPE = 0x20;
const SCOPE_HEADER = 16;

// Meter IDs (per RFC)
const MID = { SMETER_MAIN:1, SMETER_SUB:2, POWER:3, SWR:4, ALC:5, COMP:6, ID:7, VD:8, TEMP:9 };
const METER_MAP = {
  [MID.SMETER_MAIN]: 'm-smeter', [MID.POWER]: 'm-power', [MID.SWR]: 'm-swr',
  [MID.ALC]: 'm-alc', [MID.COMP]: 'm-comp', [MID.ID]: 'm-id', [MID.VD]: 'm-vd', [MID.TEMP]: 'm-temp'
};

// ===== Color LUT =====
const COLOR_LUT = new Uint32Array(161);
(function() {
  function lerp(a,b,t){return a+(b-a)*t}
  function rgba(r,g,b){return (255<<24)|(b<<16)|(g<<8)|r}
  for(let i=0;i<=160;i++){
    let r,g,b;
    if(i<=40){const t=i/40;r=0;g=0;b=lerp(10,80,t)}
    else if(i<=80){const t=(i-40)/40;r=0;g=lerp(0,220,t);b=lerp(80,200,t)}
    else if(i<=120){const t=(i-80)/40;r=lerp(0,255,t);g=lerp(220,255,t);b=lerp(200,0,t)}
    else if(i<=150){const t=(i-120)/30;r=255;g=lerp(255,40,t);b=0}
    else{const t=(i-150)/10;r=255;g=lerp(40,255,t);b=lerp(0,255,t)}
    COLOR_LUT[i]=rgba(Math.round(r),Math.round(g),Math.round(b));
  }
})();

// ===== DOM refs =====
const $ = id => document.getElementById(id);
const statusDot=$('status-dot'), connText=$('conn-text'), radioModelEl=$('radio-model');
const freqDisplayEl=$('freq-display'), tooltip=$('tooltip');
const specCv=$('spectrum'), specCtx=specCv.getContext('2d');
const wfCv=$('waterfall'), wfCtx=wfCv.getContext('2d');
const wfOvCv=$('wf-overlay'), wfOvCtx=wfOvCv.getContext('2d');
const faCv=$('freq-axis-cv'), faCtx=faCv.getContext('2d');
const modeSel=$('mode-sel'), filterSel=$('filter-sel'), powerInput=$('power-input');
const pttBtn=$('ptt-btn'), freqModal=$('freq-modal'), freqInput=$('freq-input');

// ===== State =====
let controlWs=null, scopeWs=null, metersWs=null;
let controlBackoff=WS_RECONNECT_MIN, scopeBackoff=WS_RECONNECT_MIN, metersBackoff=WS_RECONNECT_MIN;
let startFreq=14000000, endFreq=14350000;
let currentFreqA=0, currentFreqB=0, activeVfo='A';
let currentPixels=null, pttState=false;
let tuningStep=500; // Hz
let wfLineImg=null, wfLine32=null, wfMeta=[], wfH=0;
let cmdCounter=0;
const PTT_HOLD_THRESHOLD_MS = 300;
let pttDownTime = 0;
let pttPressStartState = false;
let pttPressActive = false;
let pttHoldTimer = null;
let ignoreMouseUntil = 0;

// ===== Band Plan (HF + 6m, FT8 defaults) =====
const BANDS = [
  { name:'160m', freq:  1840000, lo:  1800000, hi:  2000000 },
  { name: '80m', freq:  3573000, lo:  3500000, hi:  4000000 },
  { name: '60m', freq:  5357000, lo:  5330000, hi:  5410000 },
  { name: '40m', freq:  7074000, lo:  7000000, hi:  7300000 },
  { name: '30m', freq: 10136000, lo: 10100000, hi: 10150000 },
  { name: '20m', freq: 14074000, lo: 14000000, hi: 14350000 },
  { name: '17m', freq: 18100000, lo: 18068000, hi: 18168000 },
  { name: '15m', freq: 21074000, lo: 21000000, hi: 21450000 },
  { name: '12m', freq: 24915000, lo: 24890000, hi: 24990000 },
  { name: '10m', freq: 28074000, lo: 28000000, hi: 29700000 },
  { name:  '6m', freq: 50313000, lo: 50000000, hi: 54000000 },
];

function tuneBand(idx) {
  const band = BANDS[idx];
  const hz = band.freq;
  sendCmd('set_freq', { vfo: activeVfo, freq: hz });
  freqDisplayEl.textContent = fmtFreq(hz);
  if (activeVfo === 'A') currentFreqA = hz; else currentFreqB = hz;
  updateActiveBand(hz);
}
window.tuneBand = tuneBand;

function updateActiveBand(hz) {
  document.querySelectorAll('[data-band]').forEach(btn => {
    const b = BANDS[+btn.dataset.band];
    btn.classList.toggle('active', hz >= b.lo && hz <= b.hi);
  });
}

// ===== Helpers =====
function fmtFreq(hz){
  const m=hz/1e6;
  if(m>=100) return m.toFixed(3)+' MHz';
  if(m>=10) return m.toFixed(4)+' MHz';
  return m.toFixed(6)+' MHz';
}
function wsBase(){return (location.protocol==='https:'?'wss:':'ws:')+'//'+location.host}
function setStatus(s,t){statusDot.className='status-dot '+s;connText.textContent=t}

// ===== Resize =====
function resize(){
  const dpr=devicePixelRatio||1;
  // Spectrum
  const sw=specCv.parentElement.clientWidth, sh=specCv.parentElement.clientHeight;
  specCv.width=sw*dpr; specCv.height=sh*dpr; specCtx.setTransform(dpr,0,0,dpr,0,0);
  // Waterfall (1:1 for putImageData)
  const ww=wfCv.parentElement.clientWidth, wh=wfCv.parentElement.clientHeight;
  wfCv.width=ww; wfCv.height=wh; wfH=wh;
  wfOvCv.width=ww; wfOvCv.height=wh;
  wfLineImg=wfCtx.createImageData(ww,1); wfLine32=new Uint32Array(wfLineImg.data.buffer);
  wfMeta=new Array(wh).fill(null);
  // Freq axis
  const fw=faCv.parentElement.clientWidth, fh=faCv.parentElement.clientHeight;
  faCv.width=fw*dpr; faCv.height=fh*dpr; faCtx.setTransform(dpr,0,0,dpr,0,0);
  drawFreqAxis();
  if(currentPixels) drawSpectrum(currentPixels);
}
addEventListener('resize', resize);

// ===== Spectrum =====
function drawSpectrum(px){
  const w=specCv.parentElement.clientWidth, h=specCv.parentElement.clientHeight;
  const n=px.length; if(!n) return;
  specCtx.clearRect(0,0,w,h);
  // Grid
  specCtx.strokeStyle='#21262d'; specCtx.lineWidth=0.5;
  for(let y=0;y<h;y+=h/5){specCtx.beginPath();specCtx.moveTo(0,y);specCtx.lineTo(w,y);specCtx.stroke()}
  for(let x=0;x<w;x+=w/10){specCtx.beginPath();specCtx.moveTo(x,0);specCtx.lineTo(x,h);specCtx.stroke()}
  const sx=w/n, sy=h/160;
  // Fill
  specCtx.beginPath(); specCtx.moveTo(0,h);
  for(let i=0;i<n;i++) specCtx.lineTo(i*sx, h-px[i]*sy);
  specCtx.lineTo(w,h); specCtx.closePath();
  const g=specCtx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'rgba(88,166,255,0.3)'); g.addColorStop(1,'rgba(88,166,255,0.02)');
  specCtx.fillStyle=g; specCtx.fill();
  // Line
  specCtx.beginPath();
  for(let i=0;i<n;i++){const x=i*sx,y=h-px[i]*sy;i?specCtx.lineTo(x,y):specCtx.moveTo(x,y)}
  specCtx.strokeStyle='#58a6ff'; specCtx.lineWidth=1.2; specCtx.stroke();
  // Frequency marker + filter passband
  drawPassband(specCtx, w, h, false);
}

// ===== Waterfall =====
function drawWfLine(px){
  const w=wfCv.width, n=px.length;
  if(!n||!wfLine32) return;
  wfCtx.drawImage(wfCv,0,0,w,wfCv.height-1,0,1,w,wfCv.height-1);
  const iw=wfLineImg.width;
  for(let i=0;i<iw;i++){
    const pi=Math.min((i*n/iw)|0,n-1);
    wfLine32[i]=COLOR_LUT[Math.min(px[pi],160)];
  }
  wfCtx.putImageData(wfLineImg,0,0);
  wfMeta.pop(); wfMeta.unshift({s:startFreq,e:endFreq});
  // Redraw passband overlay (separate canvas — doesn't affect waterfall history)
  drawPassband(wfOvCtx, wfOvCv.width, wfOvCv.height, true);
}

// ===== Freq Axis =====
function drawFreqAxis(){
  const w=faCv.parentElement.clientWidth, h=faCv.parentElement.clientHeight;
  faCtx.clearRect(0,0,w,h); faCtx.fillStyle='#8b949e'; faCtx.font='10px monospace'; faCtx.textAlign='center';
  const span=endFreq-startFreq; if(span<=0) return;
  const tgt=Math.max(4,Math.min(12,(w/80)|0));
  let step=span/tgt;
  const mag=Math.pow(10,Math.floor(Math.log10(step)));
  const nm=step/mag;
  step=nm<2?2*mag:nm<5?5*mag:10*mag;
  for(let f=Math.ceil(startFreq/step)*step;f<=endFreq;f+=step){
    const x=(f-startFreq)/span*w, m=f/1e6;
    faCtx.fillStyle='#30363d'; faCtx.fillRect(x-0.5,0,1,4);
    faCtx.fillStyle='#8b949e'; faCtx.fillText(m>=100?m.toFixed(1):m.toFixed(3),x,h-4);
  }
}

// ===== Passband Overlay =====
// Offsets in Hz [low, high] relative to center frequency (carrier).
// SSB: 300-Nk Hz above (USB) or below (LSB) carrier.
// CW: centered on ~700 Hz pitch; FIL1=±250, FIL2=±125, FIL3=±50 Hz.
// AM/FM: symmetric.
const FILTER_WIDTHS = {
  'USB':    { FIL1: [300, 3000],   FIL2: [300, 2400],   FIL3: [300, 1800] },
  'LSB':    { FIL1: [-3000, -300], FIL2: [-2400, -300], FIL3: [-1800, -300] },
  'CW':     { FIL1: [450, 950],    FIL2: [575, 825],    FIL3: [650, 750] },
  'CW-R':   { FIL1: [-950, -450],  FIL2: [-825, -575],  FIL3: [-750, -650] },
  'AM':     { FIL1: [-3000, 3000], FIL2: [-2400, 2400], FIL3: [-1800, 1800] },
  'FM':     { FIL1: [-7500, 7500], FIL2: [-7500, 7500], FIL3: [-7500, 7500] },
  'RTTY':   { FIL1: [300, 3000],   FIL2: [300, 2400],   FIL3: [300, 1800] },
  'RTTY-R': { FIL1: [-3000, -300], FIL2: [-2400, -300], FIL3: [-1800, -300] },
  'PSK':    { FIL1: [300, 3000],   FIL2: [300, 2400],   FIL3: [300, 1800] },
  'PSK-R':  { FIL1: [-3000, -300], FIL2: [-2400, -300], FIL3: [-1800, -300] },
};

function drawPassband(ctx, w, h, isWaterfall) {
  const freq = activeVfo === 'A' ? currentFreqA : currentFreqB;
  if (!freq || startFreq >= endFreq) return;
  const span = endFreq - startFreq;
  const cx = (freq - startFreq) / span * w;

  const mode = modeSel.value;
  const filter = filterSel.value;
  const offsets = (FILTER_WIDTHS[mode] || FILTER_WIDTHS['USB'])[filter] || [300, 3000];
  const pbLo = freq + offsets[0];
  const pbHi = freq + offsets[1];
  const rx1 = (pbLo - startFreq) / span * w;
  const rx2 = (pbHi - startFreq) / span * w;
  const xLeft  = Math.max(0, Math.min(rx1, rx2));
  const xRight = Math.min(w, Math.max(rx1, rx2));
  const pbW = xRight - xLeft;

  if (isWaterfall) ctx.clearRect(0, 0, w, h);

  // Passband fill
  if (pbW > 0) {
    ctx.fillStyle = isWaterfall ? 'rgba(255,140,0,0.10)' : 'rgba(255,140,0,0.15)';
    ctx.fillRect(xLeft, 0, pbW, h);
    // Passband edge lines
    ctx.strokeStyle = isWaterfall ? 'rgba(255,140,0,0.35)' : 'rgba(255,140,0,0.50)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(xLeft,  0); ctx.lineTo(xLeft,  h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(xRight, 0); ctx.lineTo(xRight, h); ctx.stroke();
  }

  // Center frequency marker
  if (cx >= 0 && cx <= w) {
    ctx.strokeStyle = isWaterfall ? 'rgba(255,60,0,0.65)' : 'rgba(255,60,0,0.75)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();
  }
}

// ===== Binary Parsers =====
function parseScopeFrame(buf){
  const dv=new DataView(buf);
  if(dv.byteLength<SCOPE_HEADER||dv.getUint8(0)!==SCOPE_MSG_TYPE) return null;
  const pc=dv.getUint16(14,true);
  if(dv.byteLength<SCOPE_HEADER+pc) return null;
  return {
    receiver:dv.getUint8(1), mode:dv.getUint8(2),
    startFreq:dv.getUint32(3,true), endFreq:dv.getUint32(7,true),
    seq:dv.getUint16(11,true), flags:dv.getUint8(13), pixelCount:pc,
    pixels:new Uint8Array(buf,SCOPE_HEADER,pc)
  };
}

function parseMeterFrame(buf){
  const dv=new DataView(buf);
  if(dv.byteLength<4||dv.getUint8(0)!==METER_MSG_TYPE) return null;
  const count=dv.getUint8(3), meters=[];
  for(let i=0;i<count&&4+i*3+2<dv.byteLength;i++){
    const off=4+i*3;
    meters.push({id:dv.getUint8(off), value:dv.getUint8(off+1)|(dv.getUint8(off+2)<<8)});
  }
  return {seq:dv.getUint16(1,true), meters};
}

// ===== Meter Display =====
function updateMeter(meterId, value){
  const elId=METER_MAP[meterId]; if(!elId) return;
  const el=$(elId); if(!el) return;
  const bar=el.querySelector('.meter-bar');
  const valEl=el.querySelector('.meter-value');
  const pct=Math.min(100, value/255*100);
  bar.style.width=pct+'%';

  // Format display value
  if(meterId===MID.SMETER_MAIN||meterId===MID.SMETER_SUB){
    // 0-120=S0-S9, 120-255=S9+
    if(value<=120){const s=(value/120*9)|0; valEl.textContent='S'+s}
    else{const db=((value-120)/135*60)|0; valEl.textContent='S9+'+db}
  } else if(meterId===MID.SWR){
    // 0=1.0, 255=∞ (approximate: 0-48≈1.0-1.5, 48-80≈1.5-2.0, 80-120≈2.0-3.0)
    const swr=value<5?1.0:1.0+value/255*9;
    valEl.textContent=swr.toFixed(1);
  } else {
    valEl.textContent=((value/255*100)|0)+'%';
  }
}

  if(data.freq_b){currentFreqB=data.freq_b; if(activeVfo==='B'){freqDisplayEl.textContent=fmtFreq(data.freq_b);updateActiveBand(data.freq_b);}}
  if(data.mode) modeSel.value=data.mode;
  if(data.filter) filterSel.value=data.filter;
  if(data.power!=null) powerInput.value=data.power;
  if(data.ptt!=null){pttState=data.ptt; pttBtn.classList.toggle('active',pttState)}
  if(data.scope){
    startFreq=data.scope.start_freq||startFreq;
    endFreq=data.scope.end_freq||endFreq;
    drawFreqAxis();
  }
}

function pttPressStart() {
  pttDownTime = Date.now();
  pttPressStartState = pttState;
  pttPressActive = true;
  if (pttHoldTimer) clearTimeout(pttHoldTimer);
  pttHoldTimer = setTimeout(() => {
    pttHoldTimer = null;
  }, PTT_HOLD_THRESHOLD_MS);
  setPtt(true);
}
function pttPressEnd() {
  if (!pttPressActive) return;
  const elapsed = Date.now() - pttDownTime;
  pttPressActive = false;
  if (pttHoldTimer) {
    clearTimeout(pttHoldTimer);
    pttHoldTimer = null;
  }
  if (elapsed < PTT_HOLD_THRESHOLD_MS) {
    setPtt(!pttPressStartState);
  } else {
    setPtt(false);
  }
}
function pttPressLeave() {
  if (!pttPressActive) return;
  const elapsed = Date.now() - pttDownTime;
  if (elapsed >= PTT_HOLD_THRESHOLD_MS) {
    pttPressActive = false;
    if (pttHoldTimer) {
      clearTimeout(pttHoldTimer);
      pttHoldTimer = null;
    }
    setPtt(false);
  }
}
pttBtn.addEventListener('mousedown', () => {

});
pttBtn.addEventListener('mouseup', () => {
  if (Date.now() < ignoreMouseUntil) return;

});

});

// ===== Tuning Step =====
const MODE_STEP = {
  'USB': 500, 'LSB': 500,
  'CW': 100, 'CW-R': 100,
  'AM': 1000,
  'FM': 5000,
  'RTTY': 100, 'RTTY-R': 100, 'PSK': 100, 'PSK-R': 100,
};

function setStep(hz) {
  tuningStep = hz;
  document.querySelectorAll('[data-step]').forEach(b => b.classList.toggle('active', +b.dataset.step === hz));
}
window.setStep = setStep;

function setModeDefaultStep(mode) {
  setStep(MODE_STEP[mode] || 500);
}

// Throttled tuning: accumulate deltas locally, send command at most every 50ms
let _tunePending = 0;
let _tuneTimer = null;
function tuneByStep(delta) {
  const current = activeVfo === 'A' ? currentFreqA : currentFreqB;
  if (!current) return;
  _tunePending += delta;
  const hz = Math.max(30000, Math.min(60000000, current + _tunePending));
  // Update display immediately for responsiveness
  freqDisplayEl.textContent = fmtFreq(hz);
  if (activeVfo === 'A') currentFreqA = hz; else currentFreqB = hz;
  updateActiveBand(hz);
  if (!_tuneTimer) {
    _tuneTimer = setTimeout(() => {
      _tuneTimer = null;
      const f = activeVfo === 'A' ? currentFreqA : currentFreqB;
      _tunePending = 0;
      sendCmd('set_freq', { vfo: activeVfo, freq: f });
    }, 50);
  }
}

freqDisplayEl.addEventListener('click', ()=>{

freqInput.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    const mhz=parseFloat(freqInput.value);
    if(!isNaN(mhz)&&mhz>0){

      sendCmd('set_freq',{vfo:activeVfo,freq:hz});
      freqDisplayEl.textContent=fmtFreq(hz);
      if(activeVfo==='A') currentFreqA=hz; else currentFreqB=hz;
      updateActiveBand(hz);
    }
    freqModal.classList.remove('open');
  } else if(e.key==='Escape'){
    freqModal.classList.remove('open');
  }
});

// ===== Control WebSocket =====
function connectControl(){
  if(controlWs&&controlWs.readyState<=1) return;
  if(controlWs){controlWs.onclose=null;controlWs.onerror=null;controlWs.close();}
  controlWs=new WebSocket(wsBase()+'/api/v1/ws');
  setStatus('reconnecting','Connecting...');
  controlWs.onopen=()=>{controlBackoff=WS_RECONNECT_MIN; setStatus('connected','Connected'); showToast('Connected','info',2000)};
  controlWs.onmessage=ev=>{
    try{handleCtrlMsg(JSON.parse(ev.data))}catch(e){console.warn('ctrl parse:',e)}
  };
  controlWs.onclose=()=>{setStatus('reconnecting','Reconnecting...');showToast('Connection lost. Reconnecting...','warn',5000);setTimeout(connectControl,controlBackoff);controlBackoff=Math.min(controlBackoff*2,WS_RECONNECT_MAX)};
  controlWs.onerror=()=>controlWs.close();
}
function handleCtrlMsg(m){
  switch(m.type){
    case 'hello':
      radioModelEl.textContent=m.radio||'';
      sendControl({type:'subscribe',id:'s1',streams:['scope','meters']});
      connectScope();
      connectMeters();
      break;
    case 'state': if(m.data) updateStateFromServer(m.data); break;
    case 'event':
      if(m.name==='freq_changed'&&m.data){
        if(m.data.vfo==='A'||!m.data.vfo){currentFreqA=m.data.freq;if(activeVfo==='A'){freqDisplayEl.textContent=fmtFreq(m.data.freq);updateActiveBand(m.data.freq);}}
        else{currentFreqB=m.data.freq;if(activeVfo==='B'){freqDisplayEl.textContent=fmtFreq(m.data.freq);updateActiveBand(m.data.freq);}}
      } else if(m.name==='mode_changed'&&m.data) modeSel.value=m.data.mode;
      else if(m.name==='ptt'&&m.data){pttState=m.data.state;pttBtn.classList.toggle('active',pttState)}
      else if(m.name==='scope_meta'&&m.data){startFreq=m.data.start_freq||startFreq;endFreq=m.data.end_freq||endFreq;drawFreqAxis()}
      break;
    case 'response':
      if(!m.ok){console.warn('cmd err:',m.error,m.message);showToast(m.message||m.error||'Command failed')}
      else if(m.result) updateStateFromServer(m.result);
      break;
  }
}

// ===== Scope WebSocket =====
function connectScope(){
  if(scopeWs&&scopeWs.readyState<=1) return;
  if(scopeWs){scopeWs.onclose=null;scopeWs.onerror=null;scopeWs.close();}
  scopeWs=new WebSocket(wsBase()+'/api/v1/scope');
  scopeWs.binaryType='arraybuffer';
  scopeWs.onopen=()=>{scopeBackoff=WS_RECONNECT_MIN};
  scopeWs.onmessage=ev=>{
    if(!(ev.data instanceof ArrayBuffer)) return;
    const f=parseScopeFrame(ev.data); if(!f) return;
    if(f.startFreq!==startFreq||f.endFreq!==endFreq){startFreq=f.startFreq;endFreq=f.endFreq;drawFreqAxis()}
    currentPixels=f.pixels; drawSpectrum(f.pixels); drawWfLine(f.pixels);
  };
  scopeWs.onclose=()=>{setTimeout(connectScope,scopeBackoff);scopeBackoff=Math.min(scopeBackoff*2,WS_RECONNECT_MAX)};
  scopeWs.onerror=()=>scopeWs.close();
}

// ===== Meters WebSocket =====
function connectMeters(){
  if(metersWs&&metersWs.readyState<=1) return;
  if(metersWs){metersWs.onclose=null;metersWs.onerror=null;metersWs.close();}
  metersWs=new WebSocket(wsBase()+'/api/v1/meters');
  metersWs.binaryType='arraybuffer';
  metersWs.onopen=()=>{
    metersBackoff=WS_RECONNECT_MIN;
    // Request all meters
    metersWs.send(JSON.stringify({type:'meters_start',meters:['smeter','power','swr','alc','comp','id','vd','temp'],fps:10}));
  };
  metersWs.onmessage=ev=>{
    if(ev.data instanceof ArrayBuffer){
      const f=parseMeterFrame(ev.data); if(!f) return;
      f.meters.forEach(m=>updateMeter(m.id, m.value));
    }
  };
  metersWs.onclose=()=>{setTimeout(connectMeters,metersBackoff);metersBackoff=Math.min(metersBackoff*2,WS_RECONNECT_MAX)};
  metersWs.onerror=()=>metersWs.close();
}

// ===== Click-to-Tune =====
wfCv.parentElement.addEventListener('click', e=>{
  const r=wfCv.getBoundingClientRect(), x=e.clientX-r.left, row=(e.clientY-r.top)|0;
  let sf=startFreq,ef=endFreq;
  if(row>=0&&row<wfMeta.length&&wfMeta[row]){sf=wfMeta[row].s;ef=wfMeta[row].e}
  const rawFreq=Math.round(sf+(x/r.width)*(ef-sf));
  const freq=Math.round(rawFreq/tuningStep)*tuningStep;
  freqDisplayEl.textContent=fmtFreq(freq);
  if(activeVfo==='A') currentFreqA=freq; else currentFreqB=freq;
  sendCmd('set_freq',{vfo:activeVfo,freq});
  updateActiveBand(freq);
});

  try { localStorage.setItem('icom-lan-theme', isLight ? 'light' : 'dark'); } catch(e) {}
}
window.toggleTheme = toggleTheme;
// Restore saved theme
try {
  if (localStorage.getItem('icom-lan-theme') === 'light') {
    document.body.classList.add('light');
    themeBtn.textContent = '☀️';
  }
} catch(e) {}

// ===== Keyboard Shortcuts =====
document.addEventListener('keydown', e => {
  // Don't handle when typing in input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  switch(e.key.toLowerCase()) {
    case ' ':  // Space = PTT (hold)
      e.preventDefault();
      if (!pttState) setPtt(true);
      break;
    case 'a': selectVfo('A'); break;
    case 'b': selectVfo('B'); break;
    case 'r': toggleRxAudio(); break;
    case 'f': // F = frequency entry
      e.preventDefault();
      freqDisplayEl.click();
      break;
    case 't': toggleTheme(); break;
    // Band shortcuts: 1-9 = 160m…12m, 0 = 10m
    case '1': tuneBand(0); break;
    case '2': tuneBand(1); break;
    case '3': tuneBand(2); break;
    case '4': tuneBand(3); break;
    case '5': tuneBand(4); break;
    case '6': tuneBand(5); break;
    case '7': tuneBand(6); break;
    case '8': tuneBand(7); break;
    case '9': tuneBand(8); break;
    case '0': tuneBand(9); break;
    case 'arrowleft':
      e.preventDefault();
      tuneByStep(e.shiftKey ? -tuningStep * 10 : -tuningStep);
      break;
    case 'arrowright':
      e.preventDefault();
      tuneByStep(e.shiftKey ? tuningStep * 10 : tuningStep);
      break;
  }
});
document.addEventListener('keyup', e => {
  if (e.key === ' ' && pttState) setPtt(false);
});

// ===== Audio =====
const AUDIO_MSG_RX = 0x10;
const AUDIO_MSG_TX = 0x11;
const AUDIO_CODEC_OPUS = 0x01;
const AUDIO_CODEC_PCM16 = 0x02;
const AUDIO_HEADER = 8;

let audioWs = null, audioBackoff = WS_RECONNECT_MIN;
let audioCtx = null, gainNode = null;
let rxActive = false, txActive = false;
let audioDecoder = null;
let txStream = null, txProcessor = null;
let nextPlayTime = 0;   // monotonic scheduler: when to start the next audio buffer
let opusTimestamp = 0;  // microsecond timestamp fed to AudioDecoder (must increase)

const rxBtn = $('rx-btn');
const audioVolSlider = $('audio-vol');
const audioStatusEl = $('audio-status');

function initAudioCtx() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
  gainNode = audioCtx.createGain();
  gainNode.gain.value = audioVolSlider.value / 100;
  gainNode.connect(audioCtx.destination);
}

function setAudioVolume(v) {
  if (gainNode) gainNode.gain.value = v / 100;
}
window.setAudioVolume = setAudioVolume;

// Resume AudioContext + reconnect WebSocket after Safari iOS background suspend
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume().then(() => { nextPlayTime = 0; });
    }
    if (rxActive && (!audioWs || audioWs.readyState > 1)) {
      connectAudioWs();
    }
  }
});

function connectAudioWs() {
  if(audioWs&&audioWs.readyState<=1) return;
  if(audioWs){audioWs.onclose=null;audioWs.onerror=null;audioWs.close();}
  audioWs = new WebSocket(wsBase() + '/api/v1/audio');
  audioWs.binaryType = 'arraybuffer';
  audioWs.onopen = () => {
    audioBackoff = WS_RECONNECT_MIN;
    if (rxActive) audioWs.send(JSON.stringify({ type: 'audio_start', direction: 'rx', codec: 'opus', sample_rate: 48000 }));
  };
  audioWs.onmessage = ev => {
    if (ev.data instanceof ArrayBuffer && rxActive) handleRxAudioFrame(ev.data);
  };
  audioWs.onclose = () => {
    if (rxActive) { setTimeout(connectAudioWs, audioBackoff); audioBackoff = Math.min(audioBackoff * 2, WS_RECONNECT_MAX); }
  };
  audioWs.onerror = () => audioWs.close();
}

function handleRxAudioFrame(buf) {
  if (buf.byteLength < AUDIO_HEADER) return;
  const dv = new DataView(buf);
  const msgType = dv.getUint8(0);
  if (msgType !== AUDIO_MSG_RX) return;
  const codec = dv.getUint8(1);
  // bytes 4-5 (LE uint16): sample_rate / 100  e.g. 480 → 48000 Hz
  const sampleRate = dv.getUint16(4, true) * 100 || 48000;
  const audioData = new Uint8Array(buf, AUDIO_HEADER);
  if (audioData.length === 0) return;

  if (codec === AUDIO_CODEC_PCM16) {
    playPcmAudio(audioData, sampleRate);
  } else if (codec === AUDIO_CODEC_OPUS) {
    decodeAndPlayOpus(audioData);
  }
}

// Play raw PCM s16le mono audio directly via Web Audio API.
// No decoder needed — convert Int16 samples to Float32 and schedule the buffer.
function playPcmAudio(pcmBytes, sampleRate) {
  if (!audioCtx || !rxActive) return;
  const numSamples = pcmBytes.byteLength >> 1; // 2 bytes per s16le sample
  if (numSamples === 0) return;

  // Interpret raw bytes as signed 16-bit little-endian samples
  const int16 = new Int16Array(pcmBytes.buffer, pcmBytes.byteOffset, numSamples);
  const float32 = new Float32Array(numSamples);
  for (let i = 0; i < numSamples; i++) float32[i] = int16[i] / 32768.0;

  const abuf = audioCtx.createBuffer(1, numSamples, sampleRate);
  abuf.copyToChannel(float32, 0);

  const src = audioCtx.createBufferSource();
  src.buffer = abuf;
  src.connect(gainNode);

  // Keep nextPlayTime at least a small amount ahead to absorb network jitter.
  const now = audioCtx.currentTime;
  if (nextPlayTime < now + 0.01) nextPlayTime = now + 0.20; // 200 ms pre-roll for mobile/VPN
  src.start(nextPlayTime);
  nextPlayTime += abuf.duration;
}

// Decode an Opus frame and schedule playback.
// Timestamps must be monotonically increasing (microseconds, 20 ms = 20000 µs).
// Each decoded buffer is scheduled at nextPlayTime instead of time 0.
function decodeAndPlayOpus(opusData) {
  if (typeof AudioDecoder === 'undefined') return;
  if (!audioDecoder) {
    opusTimestamp = 0;
    audioDecoder = new AudioDecoder({
      output: (audioData) => {
        const nch = audioData.numberOfChannels;
        const nf = audioData.numberOfFrames;
        const samples = new Float32Array(nf);
        audioData.copyTo(samples, { planeIndex: 0 });
        const abuf = audioCtx.createBuffer(1, nf, audioData.sampleRate);
        abuf.copyToChannel(samples, 0);
        const src = audioCtx.createBufferSource();
        src.buffer = abuf;
        src.connect(gainNode);
        const now = audioCtx.currentTime;
        if (nextPlayTime < now + 0.01) nextPlayTime = now + 0.05;
        src.start(nextPlayTime);
        nextPlayTime += abuf.duration;
        audioData.close();
      },
      error: (e) => { console.warn('AudioDecoder error:', e); audioDecoder = null; }
    });
    audioDecoder.configure({ codec: 'opus', sampleRate: 48000, numberOfChannels: 1 });
  }
  try {
    audioDecoder.decode(new EncodedAudioChunk({ type: 'key', timestamp: opusTimestamp, data: opusData }));
    opusTimestamp += 20000; // 20 ms per frame in microseconds
  } catch (e) { /* decoder may be flushing */ }
}

function toggleRxAudio() {
  if (!rxActive) {
    initAudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    rxActive = true;
    nextPlayTime = 0;
    opusTimestamp = 0;
    rxBtn.classList.add('active');
    rxBtn.textContent = '🔊 RX ON';
    audioStatusEl.textContent = 'Streaming...';
    if (!audioWs || audioWs.readyState > 1) {
      connectAudioWs();
    } else {
      audioWs.send(JSON.stringify({ type: 'audio_start', direction: 'rx', codec: 'opus', sample_rate: 48000 }));
    }
  } else {
    rxActive = false;
    nextPlayTime = 0;
    opusTimestamp = 0;
    rxBtn.classList.remove('active');
    rxBtn.textContent = '🔊 RX';
    audioStatusEl.textContent = '';
    if (audioWs && audioWs.readyState === 1) {
      audioWs.send(JSON.stringify({ type: 'audio_stop', direction: 'rx' }));
    }
    if (audioDecoder) {
      try { audioDecoder.close(); } catch(e) {}
      audioDecoder = null;
    }
  }
}
window.toggleRxAudio = toggleRxAudio;

// ===== TX Audio (mic capture) =====
async function startTxAudio() {
  if (txActive) return;
  initAudioCtx();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  try {
    txStream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 48000, channelCount: 1, echoCancellation: true, noiseSuppression: true } });
  } catch(e) { console.warn('Mic access denied:', e); return; }

  txActive = true;
  if (!audioWs || audioWs.readyState > 1) connectAudioWs();

  // Need to encode to Opus — use AudioEncoder if available
  if (typeof AudioEncoder !== 'undefined') {
    const source = audioCtx.createMediaStreamSource(txStream);
    // Use MediaStreamTrackProcessor for raw PCM → AudioEncoder → Opus
    if (typeof MediaStreamTrackProcessor !== 'undefined') {
      const track = txStream.getAudioTracks()[0];
      const processor = new MediaStreamTrackProcessor({ track });
      const reader = processor.readable.getReader();

      const encoder = new AudioEncoder({
        output: (chunk) => {
          const data = new Uint8Array(chunk.byteLength);
          chunk.copyTo(data);
          // Build wire frame: 8-byte header + opus data
          const frame = new ArrayBuffer(AUDIO_HEADER + data.length);
          const dv = new DataView(frame);
          dv.setUint8(0, AUDIO_MSG_TX);
          dv.setUint8(1, AUDIO_CODEC_OPUS);
          dv.setUint16(2, 0, true); // seq (server doesn't use it)
          dv.setUint16(4, 480, true); // 48000/100
          dv.setUint8(6, 1); // mono
          dv.setUint8(7, 20); // 20ms
          new Uint8Array(frame, AUDIO_HEADER).set(data);
          if (audioWs && audioWs.readyState === 1) audioWs.send(frame);
        },
        error: (e) => console.warn('AudioEncoder error:', e)
      });
      encoder.configure({ codec: 'opus', sampleRate: 48000, numberOfChannels: 1, bitrate: 32000 });

      txProcessor = { reader, encoder, source };

      // Read loop
      (async () => {
        try {
          while (txActive) {
            const { value, done } = await reader.read();
            if (done) break;
            encoder.encode(value);
            value.close();
          }
        } catch(e) { /* stream ended */ }
      })();

      // Tell server TX is starting
      if (audioWs && audioWs.readyState === 1) {
        audioWs.send(JSON.stringify({ type: 'audio_start', direction: 'tx', codec: 'opus', sample_rate: 48000 }));
      }
    }
  }
}

function stopTxAudio() {
  if (!txActive) return;
  txActive = false;
  if (txProcessor) {
    try { txProcessor.reader.cancel(); } catch(e) {}
    try { txProcessor.encoder.close(); } catch(e) {}
    try { txProcessor.source.disconnect(); } catch(e) {}
    txProcessor = null;
  }
  if (txStream) {
    txStream.getTracks().forEach(t => t.stop());
    txStream = null;
  }
  if (audioWs && audioWs.readyState === 1) {
    audioWs.send(JSON.stringify({ type: 'audio_stop', direction: 'tx' }));
  }
}

// Hook TX audio into PTT — update setPtt:
const _origSetPtt = setPtt;
setPtt = function(state) {
  if (state === pttState) return;
  pttState = state;
  pttBtn.classList.toggle('active', state);
  sendCmd('ptt', { state });
  if (state) startTxAudio();
  else stopTxAudio();
};
window.setPtt = setPtt;

// ===== Init =====
resize();
setStep(tuningStep); // highlight default step button
connectControl();
</script>
</body>
</html>
