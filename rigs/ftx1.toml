# Rig Configuration — Yaesu FTX-1
# Yaesu FT-X1 transceiver profile.
# Protocol: Yaesu CAT (not CI-V)
# Source: wfview FTX-1.rig, Yaesu FT-X1 CAT manual

[radio]
id = "yaesu_ftx1"
model = "FTX-1"
receiver_count = 2
has_lan = false
has_wifi = false
default_baud = 38400

[protocol]
type = "yaesu_cat"

[capabilities]
features = [
    "audio",
    "dual_rx",
    "af_level",
    "rf_gain",
    "squelch",
    "attenuator",
    "preamp",
    "nb",
    "nr",
    "notch",
    "filter_width",
    "tx",
    "split",
    "vox",
    "compressor",
    "monitor",
    "cw",
    "rit",
    "tuner",
    "meters",
    "repeater_tone",
    "tsql",
    "data_mode",
    "scan",
    "dial_lock",
]

[modes]
list = [
    "LSB", "USB", "CW-U", "FM", "AM",
    "RTTY-L", "CW-L", "DATA-L", "RTTY-U", "DATA-FM",
    "FM-N", "DATA-U", "AM-N", "PSK", "DATA-FM-N",
    "C4FM-DN", "C4FM-VW",
]

[filters]
list = ["FIL1", "FIL2", "FIL3"]

[vfo]
scheme = "ab_shared"

[attenuator]
values = [0, 1, 2, 3]

[preamp]
values = [0, 1, 2]

[controls.attenuator]
style = "selector"

[controls.nb]
style = "level_is_toggle"
range_min = 0
range_max = 10

[controls.nr]
style = "level_is_toggle"
range_min = 1
range_max = 15

