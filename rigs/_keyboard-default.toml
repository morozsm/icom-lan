[keyboard]
leader_key = "g"
leader_timeout_ms = 1000
alt_hints = true
help_title = "Radio Keyboard"

[[keyboard.bindings]]
id = "step-up"
section = "Tuning"
label = "Increase tuning step"
description = "Select the next tuning step value on the frontend."
key = "ArrowUp"
action = "adjust_tuning_step"
[keyboard.bindings.params]
direction = "up"

[[keyboard.bindings]]
id = "step-down"
section = "Tuning"
label = "Decrease tuning step"
description = "Select the previous tuning step value on the frontend."
key = "ArrowDown"
action = "adjust_tuning_step"
[keyboard.bindings.params]
direction = "down"

[[keyboard.bindings]]
id = "nudge-left"
section = "Tuning"
label = "Tune down"
description = "Tune the active receiver down by the current frontend tuning step."
key = "ArrowLeft"
action = "tune"
repeatable = true
[keyboard.bindings.params]
direction = "down"
fine = false

[[keyboard.bindings]]
id = "nudge-right"
section = "Tuning"
label = "Tune up"
description = "Tune the active receiver up by the current frontend tuning step."
key = "ArrowRight"
action = "tune"
repeatable = true
[keyboard.bindings.params]
direction = "up"
fine = false

[[keyboard.bindings]]
id = "page-up"
section = "Tuning"
label = "Tune +1 kHz"
description = "Jump the active receiver up by 1 kHz."
key = "PageUp"
action = "tune"
repeatable = true
[keyboard.bindings.params]
deltaHz = 1000

[[keyboard.bindings]]
id = "page-down"
section = "Tuning"
label = "Tune -1 kHz"
description = "Jump the active receiver down by 1 kHz."
key = "PageDown"
action = "tune"
repeatable = true
[keyboard.bindings.params]
deltaHz = -1000

