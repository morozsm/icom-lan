# Rig Configuration — Xiegu X6100
# Xiegu X6100 QRP transceiver.
# Protocol: CI-V (IC-705 compatible subset)
# CIV address: 0x70
# Source: Xiegu X6100 documentation, CI-V reference

[radio]
id = "xiegu_x6100"
model = "X6100"
civ_addr = 0x70
receiver_count = 1
has_lan = false
has_wifi = true
default_baud = 115200

[protocol]
type = "civ"
address = 0x70

[capabilities]
features = [
    "audio",
    "af_level",
    "rf_gain",
    "squelch",
    "attenuator",
    "preamp",
    "nb",
    "nr",
    "notch",
    "filter_width",
    "pbt",
    "tx",
    "split",
    "vox",
    "compressor",
    "cw",
    "break_in",
    "rit",
    "xit",
    "tuner",
    "meters",
    "repeater_tone",
    "tsql",
    "data_mode",
    "scan",
    "dial_lock",
]

[modes]
list = ["USB", "LSB", "CW", "CW-R", "AM", "FM", "RTTY", "DIGI"]

[filters]
list = ["FIL1", "FIL2", "FIL3"]

[vfo]
scheme = "ab"

[attenuator]
values = [0, 1]

[preamp]
values = [0, 1]

[controls.attenuator]
style = "toggle"

# Level control ranges — CI-V compatible (Xiegu X6100)
[controls.pbt_inner]
raw_min = 0
raw_max = 255
raw_center = 128
display_min = -1200
display_max = 1200
display_unit = "Hz"

[controls.pbt_outer]
raw_min = 0
raw_max = 255
raw_center = 128
display_min = -1200
display_max = 1200
display_unit = "Hz"

[controls.af_level]
raw_min = 0
raw_max = 255

[controls.rf_gain]
raw_min = 0
raw_max = 255

[controls.squelch]
raw_min = 0
raw_max = 255

[controls.nr_level]
raw_min = 0
raw_max = 255

[controls.nb_level]
raw_min = 0
raw_max = 255

[controls.compressor_level]
raw_min = 0
raw_max = 255

[controls.cw_pitch]
raw_min = 0
raw_max = 255
display_min = 300
display_max = 900
display_unit = "Hz"

[controls.rit]
raw_min = -9999
raw_max = 9999
raw_center = 0
display_min = -9999
display_max = 9999
display_unit = "Hz"

[[freq_ranges.ranges]]
label = "HF"
start_hz = 100000
end_hz = 54000000

[[freq_ranges.ranges.bands]]
name = "160m"
start_hz = 1800000
end_hz = 2000000
default_hz = 1825000

[[freq_ranges.ranges.bands]]
name = "80m"
start_hz = 3500000
end_hz = 3800000
default_hz = 3600000

[[freq_ranges.ranges.bands]]
name = "40m"
start_hz = 7000000
end_hz = 7200000
default_hz = 7100000

[[freq_ranges.ranges.bands]]
name = "30m"
start_hz = 10100000
end_hz = 10150000
default_hz = 10125000

[[freq_ranges.ranges.bands]]
name = "20m"
start_hz = 14000000
end_hz = 14350000
default_hz = 14200000

[[freq_ranges.ranges.bands]]
name = "17m"
start_hz = 18068000
end_hz = 18168000
default_hz = 18100000

[[freq_ranges.ranges.bands]]
name = "15m"
start_hz = 21000000
end_hz = 21450000
default_hz = 21200000

[[freq_ranges.ranges.bands]]
name = "12m"
