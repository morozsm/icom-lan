# Rig Configuration — Lab599 Discovery TX-500
# Ultra-compact 10W HF/50MHz SDR transceiver
# Protocol: Kenwood TS-2000 CAT (text-based, NOT CI-V)
# Source: User manual v1.12.08, HRD support page, lab599.com specs
#
# NOTE: This radio uses a fundamentally different protocol than Icom.
# The TOML captures the same abstract capabilities, but the command
# mapping layer must translate to Kenwood CAT text commands.

# ═══ Layer 0: PROTOCOL ═══════════════════════════════════════════

[radio]
id = "lab599_tx500"
model = "TX-500"
manufacturer = "Lab599"
receiver_count = 1
has_lan = false
has_wifi = false
has_ethernet = false

[protocol]
type = "kenwood_cat"         # Text-based: "FA00014200000;" format
variant = "lab599"           # Lab599 extended commands on top of TS-2000
baud = 38400
# Known commands (TS-2000 compatible subset):
# ID, AI, RX, TX, IF, FA, FB, MD, FR, FT, FN, PA, RA
# Lab599 extensions add more (undocumented publicly)

# Abstract command → protocol mapping
# This replaces CI-V hex codes with Kenwood text commands
[protocol.commands]
get_freq_a = "FA;"           # Read VFO-A frequency
set_freq_a = "FA{freq11};"   # Set VFO-A (11-digit Hz)
get_freq_b = "FB;"
set_freq_b = "FB{freq11};"
get_mode = "MD;"
set_mode = "MD{mode1};"      # 1=LSB, 2=USB, 3=CW, 4=FM, 5=AM, 6=FSK, 7=CW-R, 9=FSK-R
get_info = "IF;"             # Full transceiver status (freq + RIT + mode + etc.)
ptt_on = "TX0;"
ptt_off = "RX;"
get_preamp = "PA;"
set_preamp = "PA{val};"      # 0=OFF, 1=ON
get_att = "RA;"
set_att = "RA{val};"         # 00=OFF, 01=ON (2-char)
get_vfo_select = "FR;"
set_vfo_select = "FR{vfo};"  # 0=VFO-A, 1=VFO-B
get_id = "ID;"               # Returns "ID019;" (TS-2000 compat)

# ═══ Layer 1: CAPABILITIES ═══════════════════════════════════════

[capabilities]
features = [
    # Receiver
    "audio",
    "af_level",
    "rf_gain",
    "squelch",
    # RF front end
    "attenuator",
    "preamp",
    # DSP / Noise
    "nb",
    "nr",
    "notch",
    # Filter
    "filter_width",           # 4 adjustable digital filters
    # TX
    "tx",
    "split",
    "vox",
    # CW
    "cw",
    "break_in",
    # RIT / XIT
    "rit",
    "xit",
    # Metering
    "meters",
    # Data
    "data_mode",
    # System
    "power_control",
    "memory_channels",
    # Audio
    "audio_eq",               # 3-band receive audio equalizer
]

# ═══ Layer 2: CONTROLS ═══════════════════════════════════════════

[controls.attenuator]
style = "toggle"             # ON/OFF, 20 dB
values = [0, 1]
labels = { "0" = "OFF", "1" = "20dB" }
default = 0

[controls.preamp]
style = "toggle"             # ON/OFF, per-band gain
values = [0, 1]
labels = { "0" = "OFF", "1" = "ON" }
default = 0
# Note: Preamp gain level is a per-band menu setting, not real-time adjustable

[controls.nb]
style = "toggle_with_level"
level_range = [0, 10]
default = false

[controls.nr]
style = "toggle_with_level"
level_range = [0, 10]
default = false

[controls.notch]
style = "toggle"             # Automatic notch filtering
default = false

[controls.rf_power]
style = "slider"
range = [1, 10]              # 10W max
unit = "W"
default = 10
# Note: NOT controllable via CAT (TS-2000 PA/RA only)
# This is a display-only control unless Lab599 extended protocol used

[controls.filter_width]
style = "selector"           # 4 discrete digital filters
values = [0, 1, 2, 3]
labels = { "0" = "WIDE", "1" = "MED", "2" = "NAR", "3" = "XNAR" }
default = 0

[controls.audio_eq]
style = "multi_band"
bands = 3                    # 3-band EQ
range = [0, 10]              # Per-band level

[controls.cw_speed]
style = "slider"
range = [5, 50]
unit = "WPM"
default = 20

[controls.break_in]
style = "selector"
values = [0, 1, 2]
labels = { "0" = "OFF", "1" = "SEMI", "2" = "FULL" }
default = 0

# ═══ Layer 3: RULES ══════════════════════════════════════════════

# ATT and PREAMP are mutually exclusive
[[rules]]
kind = "mutex"
fields = ["attenuator", "preamp"]

# ═══ METERS ══════════════════════════════════════════════════════

# TX-500 S-meter via IF command or SM command (if lab599 extended)
[meters.s_meter]
type = "lookup"
unit = "dBm"
[[meters.s_meter.calibration]]
# Estimated from typical Kenwood-compatible S-meter mapping
raw = [0, 3, 6, 9, 12, 15, 20, 25, 30]
actual_db = [-54, -48, -42, -36, -30, -24, -18, -12, -6]
redline_raw = 30

[meters.power]
type = "linear"
raw_max = 100
max_watts = 10
unit = "W"

# ═══ VFO ═════════════════════════════════════════════════════════

[vfo]
scheme = "ab"                # 2 VFOs (A/B), 1 receiver
vfo_count = 2
has_equal = false            # Not available via CAT
has_swap = false             # Not available via CAT
has_split = true

# ═══ MODES ═══════════════════════════════════════════════════════

[modes]
list = ["LSB", "USB", "CW", "FM", "AM", "CW-R", "RTTY", "RTTY-R"]
# Kenwood mode registers: 1=LSB, 2=USB, 3=CW, 4=FM, 5=AM, 6=FSK, 7=CW-R, 9=FSK-R

# ═══ BANDS ═══════════════════════════════════════════════════════

[[freq_ranges.ranges]]
label = "160m"
start_hz = 1_800_000
end_hz = 2_000_000

[[freq_ranges.ranges]]
label = "80m"
start_hz = 3_500_000
end_hz = 4_000_000

[[freq_ranges.ranges]]
label = "60m"
start_hz = 5_250_000
end_hz = 5_450_000

[[freq_ranges.ranges]]
label = "40m"
start_hz = 7_000_000
end_hz = 7_300_000

[[freq_ranges.ranges]]
label = "30m"
start_hz = 10_100_000
end_hz = 10_150_000

[[freq_ranges.ranges]]
label = "20m"
start_hz = 14_000_000
end_hz = 14_350_000

[[freq_ranges.ranges]]
label = "17m"
start_hz = 18_068_000
end_hz = 18_168_000

[[freq_ranges.ranges]]
label = "15m"
start_hz = 21_000_000
end_hz = 21_450_000

[[freq_ranges.ranges]]
label = "12m"
start_hz = 24_890_000
end_hz = 24_990_000

[[freq_ranges.ranges]]
