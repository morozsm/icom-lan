# RX-only ranges
[[freq_ranges.ranges]]
label = "WFM"
start_hz = 88_000_000
end_hz = 108_000_000
rx_only = true

[[freq_ranges.ranges]]
label = "Air"
start_hz = 108_000_000
end_hz = 136_000_000
rx_only = true

# General coverage RX
[[freq_ranges.ranges]]
label = "Gen"
start_hz = 500_000
end_hz = 30_000_000
rx_only = true
