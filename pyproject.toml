[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "icom-lan"
version = "0.2.0"
description = "Python library for controlling Icom transceivers over LAN (UDP) — no wfview/hamlib required"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Sergey Morozik", email = "morozsm@gmail.com" },
]
keywords = ["icom", "ham-radio", "amateur-radio", "transceiver", "ci-v", "ic-7610", "ic-705"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Topic :: Communications :: Ham Radio",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

[project.scripts]
icom-lan = "icom_lan.cli:main"

[project.optional-dependencies]
audio = ["opuslib"]
dev = ["pytest", "pytest-asyncio"]
